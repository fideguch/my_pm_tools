name: Monthly API Spec Check

on:
  schedule:
    - cron: '0 9 1 * *' # 1st of every month at 09:00 UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  credential-safety:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for leaked tokens in source
        run: |
          echo "Scanning for potential leaked credentials..."
          PATTERNS=(
            'ntn_[a-zA-Z0-9]'
            'GOCSPX-[a-zA-Z0-9]'
            'sk-[a-zA-Z0-9]{20,}'
            'ghp_[a-zA-Z0-9]{36}'
            'gho_[a-zA-Z0-9]{36}'
          )
          FOUND=0
          for pattern in "${PATTERNS[@]}"; do
            if grep -rn --include='*.ts' --include='*.js' --include='*.sh' --include='*.json' \
               -E "$pattern" src/ scripts/ skills/ .github/ 2>/dev/null | grep -v 'node_modules'; then
              echo "WARNING: Potential credential match for pattern: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Potential leaked credentials detected. Review matches above."
            exit 1
          fi
          echo "No leaked credentials found."

      - name: Check API spec freshness
        run: |
          echo "API spec files last modified:"
          find skills/workspace-bridge/api-specs -name '*.md' -exec stat -c '%Y %n' {} \; 2>/dev/null \
            || find skills/workspace-bridge/api-specs -name '*.md' -exec stat -f '%m %N' {} \; 2>/dev/null \
            || echo "No api-specs found"
          echo ""
          echo "Note: Full API changelog checking to be implemented in future."
          echo "Manual review recommended: check vendor docs for breaking changes."
